    <text x="24" y="38" fill="#aeb4c0"
          font-family="Arial, sans-serif" font-size="18"
          font-weight="700" letter-spacing="1.5">GRADIENTS &amp; COLOR MATH</text>
    <rect x="24" y="62" width="312" height="58" rx="12"
          fill="url(#color-ramp)"/>
    <g transform="translate(24 142)" font-family="Arial, sans-serif"
       font-size="17" font-weight="700">
      <rect width="78" height="44" rx="12" fill="#242936" stroke="#42495a"/>
      <text x="22" y="29" fill="#f3f4f6">ΔE</text>
      <rect x="90" width="103" height="44" rx="12" fill="#242936"
            stroke="#42495a"/>
      <text x="106" y="29" fill="#f3f4f6">KELVIN</text>
      <rect x="205" width="107" height="44" rx="12" fill="#242936"
            stroke="#42495a"/>
      <text x="221" y="29" fill="#f3f4f6">BLEND</text>
    </g>
  </g>

  <g transform="translate(94 530)">
    <circle cx="8" cy="8" r="8" fill="#f87171"/>
    <circle cx="34" cy="8" r="8" fill="#fbbf24"/>
    <circle cx="60" cy="8" r="8" fill="#34d399"/>
    <circle cx="86" cy="8" r="8" fill="#60a5fa"/>
    <text x="116" y="17" fill="#d1d5db"
          font-family="Arial, sans-serif" font-size="23"
          font-weight="700">Clojure color toolkit</text>
    <text x="680" y="17" fill="#d1d5db"
          font-family="Arial, sans-serif" font-size="23"
          font-weight="700">color-tools.jonramos.dev</text>
  </g>
</svg>
