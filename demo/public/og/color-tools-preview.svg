<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-labelledby="title desc">
  <title id="title">Color Tools RGB to HEX converter preview</title>
  <desc id="desc">Preview card for Color Tools, a CSS color converter with RGB, HEX, HSL, HSV, palettes, gradients, and contrast checks.</desc>
  <defs>
    <linearGradient id="accent" x1="80" x2="1120" y1="0" y2="0">
      <stop offset="0" stop-color="#f87171"/>
      <stop offset="0.2" stop-color="#e8a634"/>
      <stop offset="0.45" stop-color="#34d399"/>
      <stop offset="0.7" stop-color="#60a5fa"/>
      <stop offset="1" stop-color="#a78bfa"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="#0c0e14"/>
  <rect x="56" y="54" width="1088" height="522" rx="28" fill="#13151d" stroke="#2c3140"/>
  <rect x="86" y="84" width="1028" height="10" rx="5" fill="url(#accent)"/>
  <text x="92" y="170" fill="#e8eaed" font-family="Arial, sans-serif" font-size="68" font-weight="700">RGB to HEX Converter</text>
  <text x="96" y="224" fill="#9ca3af" font-family="Arial, sans-serif" font-size="30">HEX, RGBA, HSL, HSV, palettes, gradients, and WCAG contrast</text>
  <rect x="96" y="290" width="456" height="168" rx="18" fill="#1a1d28" stroke="#343947"/>
  <text x="124" y="346" fill="#9ca3af" font-family="Arial, sans-serif" font-size="24" font-weight="700">INPUT</text>
  <text x="124" y="402" fill="#f5c563" font-family="Menlo, Consolas, monospace" font-size="34">rgb(52, 152, 219)</text>
  <rect x="624" y="290" width="480" height="168" rx="18" fill="#3498db"/>
  <text x="652" y="346" fill="#06111a" font-family="Arial, sans-serif" font-size="24" font-weight="700">OUTPUT</text>
  <text x="652" y="404" fill="#06111a" font-family="Menlo, Consolas, monospace" font-size="48" font-weight="700">#3498DB</text>
  <g transform="translate(96 506)">
    <circle cx="20" cy="20" r="18" fill="#f87171"/>
    <circle cx="76" cy="20" r="18" fill="#e8a634"/>
    <circle cx="132" cy="20" r="18" fill="#34d399"/>
    <circle cx="188" cy="20" r="18" fill="#60a5fa"/>
    <text x="244" y="31" fill="#e8eaed" font-family="Arial, sans-serif" font-size="28" font-weight="700">color-tools.jonramos.dev</text>
  </g>
