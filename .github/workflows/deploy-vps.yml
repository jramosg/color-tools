name: Deploy demo to VPS

on:
  push:
    branches:
      - master
  workflow_dispatch:
  workflow_run:
    workflows: ["Checks"]
    types:
      - completed

jobs:
  build-and-deploy:
    name: Build and Deploy to VPS
    runs-on: ubuntu-latest
    if: >
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'workflow_run' &&
       github.event.workflow_run.conclusion == 'success' &&
       github.event.workflow_run.head_branch == 'master')
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '25'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install Clojure
        uses: DeLaGuardo/setup-clojure@12.5
        with:
          cli: latest

      - name: Cache Clojure dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.m2/repository
            ~/.gitlibs
            ~/.deps.clj
          key: clj-${{ hashFiles('demo/deps.edn') }}
          restore-keys: clj-

      - name: Cache npm dependencies
        uses: actions/cache@v4
        with:
          path: demo/node_modules
          key: npm-${{ hashFiles('demo/package-lock.json') }}
          restore-keys: npm-

      - name: Cache shadow-cljs
        uses: actions/cache@v4
        with:
          path: demo/.shadow-cljs
          key: shadow-${{ hashFiles('demo/deps.edn', 'demo/shadow-cljs.edn') }}
          restore-keys: shadow-

      - name: Install npm dependencies
        working-directory: demo
        run: npm ci

      - name: Build demo
        working-directory: demo
        env:
          CI: true
        run: npm run build

      - name: Patch index.html with hashed JS filename
        run: |
          JS_FILE=$(grep -o '"main\.[^"]*\.js"' demo/public/js/manifest.edn | tr -d '"')
          sed -i "s|js/main\.js|js/${JS_FILE}|g" demo/public/index.html

      - name: Package static files
        run: tar -czf color-tools-demo.tar.gz -C demo/public .

      - name: Upload to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: ${{ secrets.SERVER_PORT }}
          source: 'color-tools-demo.tar.gz'
          target: '/tmp/'

      - name: Deploy on server
        uses: appleboy/ssh-action@v1.0.3
        env:
          DEPLOY_DIR: ${{ secrets.COLOR_TOOLS_DEPLOY_DIR }}
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: ${{ secrets.SERVER_PORT }}
          envs: DEPLOY_DIR
          script: |
            mkdir -p "$DEPLOY_DIR"
            tar -xzf /tmp/color-tools-demo.tar.gz -C "$DEPLOY_DIR"
            rm -f /tmp/color-tools-demo.tar.gz
            echo "Deployed to $DEPLOY_DIR"
